name: "Feature Request / 功能需求"
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 openIndu 提出改进建议！
  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 描述你遇到的场景或痛点，例如"我在使用 X 时，无法做到 Y"
      placeholder: 例：在数据大屏中无法自定义展示的指标，导致无法满足不同产线的需求
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你期望的功能或解决方式
      placeholder: 例：支持拖拽式配置大屏组件，可自定义展示的设备指标
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 你考虑过哪些替代方案？（可选）
  - type: dropdown
    id: priority
    attributes:
      label: 重要程度
      options:
        - 高 — 严重影响使用
        - 中 — 影响效率
        - 低 — 锦上添花
