name: "Bug Report / Bug 报告"
description: 报告一个问题，帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告问题！请尽量提供详细信息，便于复现和修复。
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述发生了什么问题
      placeholder: 例：点击设备管理中的"删除"按钮后，页面白屏
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 描述如何稳定复现该问题
      placeholder: |
        1. 进入「设备管理」页面
        2. 选中任意一条设备记录
        3. 点击「删除」按钮
        4. 页面出现白屏
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望应该发生什么
      placeholder: 例：弹出确认框，确认后删除该设备并刷新列表
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
      placeholder: 例：页面直接白屏，控制台报 TypeError
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、浏览器/版本、平台版本等
      placeholder: |
        - OS: Windows 11
        - 浏览器: Chrome 125
        - openIndu-platform 版本: v0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 截图 / 日志
      description: 如有截图或错误日志，请粘贴在此（可选）
